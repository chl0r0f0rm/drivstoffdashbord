name: Fetch BAF (Color Line + Fjord Line)

# Kjører 2 ganger per måned kl. 04:00 UTC:
# - 15. (midten av måneden)
# - siste dag i måneden (detekteres i jobb via "tomorrow is day 01")
on:
  schedule:
    - cron: "0 4 15 * *"
    - cron: "0 4 28-31 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide if run should proceed
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          day="$(date -u +%d)"
          if [ "$day" = "15" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$(date -u -d tomorrow +%d)" = "01" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_run=false" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r baf/requirements.txt

      - name: Fetch BAF -> baf_data.csv
        if: steps.gate.outputs.should_run == 'true'
        run: python baf/fetch_baf.py

      - name: Commit if changed
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add baf_data.csv
          if git diff --staged --quiet; then
            echo "Ingen endring i BAF-data."
          else
            git commit -m "chore(baf): oppdater baf_data.csv [skip ci]"
            git push
          fi
