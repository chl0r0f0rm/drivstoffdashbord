name: Fetch BAF – Color Line

on:
  schedule:
    - cron: "0 7 3 * *"
  workflow_dispatch:

jobs:
  fetch-colorline-baf:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run unit tests
        run: python -m unittest baf/test_colorline_baf.py -v

      - name: Fetch Color Line BAF
        run: python baf/fetch_colorline_baf.py

      - name: Upload BAF snapshot
        uses: actions/upload-artifact@v4
        with:
          name: colorline-baf
          path: data/colorline_baf.csv

      - name: Commit BAF CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/colorline_baf.csv
          git diff --staged --quiet || git commit -m "chore: Color Line BAF update $(date -u +%Y-%m-%d)"
          git push origin main
