name: Update fuel prices – SE

on:
  schedule:
    - cron: "0 6 * * 1"
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: weekly (XLS) or daily (live scrape)
        required: true
        default: weekly
        type: choice
        options:
          - weekly
          - daily

jobs:
  se-weekly:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 6 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Install dependencies
        run: pip install requests xlrd==1.2.0 beautifulsoup4 lxml

      - name: Fetch and upsert SE monthly data
        env:
          SUPABASE_URL: https://fnkdbuqsschkvpzeumbz.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FETCH_MODE: weekly
          FETCH_COUNTRY: se
        run: python supabase/fetch_prices.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/preem_SE_månedlig.csv data/circklek_SE_månedlig.csv data/circklek_SE_daglig.csv
          git diff --staged --quiet || git commit -m "chore: weekly SE price update $(date -u +%Y-%m-%d)"
          git push origin main

  se-daily:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 7 * * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch and upsert SE daily live prices
        env:
          SUPABASE_URL: https://fnkdbuqsschkvpzeumbz.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FETCH_MODE: daily
          FETCH_COUNTRY: se
        run: python supabase/fetch_prices.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/circklek_SE_daglig.csv
          git diff --staged --quiet || git commit -m "chore: daily SE price update $(date -u +%Y-%m-%d)"
          git push origin main
