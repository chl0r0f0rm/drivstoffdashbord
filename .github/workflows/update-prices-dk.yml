name: Update fuel prices – DK

on:
  schedule:
    - cron: "30 7 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pdfplumber lxml

      - name: Fetch and upsert DK prices from PDF
        env:
          SUPABASE_URL: https://fnkdbuqsschkvpzeumbz.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FETCH_MODE: daily
          FETCH_COUNTRY: dk
        run: python supabase/fetch_prices.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/circklek_DK_månedlig.csv data/circklek_DK_daglig.csv data/circklek_DK_månedlig_inkl.csv data/circklek_DK_daglig_inkl.csv
          git diff --staged --quiet || git commit -m "chore: daily DK price update $(date -u +%Y-%m-%d)"
          git push origin main
