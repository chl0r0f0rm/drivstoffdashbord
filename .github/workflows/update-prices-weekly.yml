name: Update fuel prices – SE weekly

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Install dependencies
        run: pip install requests xlrd==1.2.0 beautifulsoup4 lxml

      - name: Fetch and upsert price data
        env:
          SUPABASE_URL: https://fnkdbuqsschkvpzeumbz.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          FETCH_MODE: weekly
        run: python supabase/fetch_prices.py

      - name: Commit updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/preem_SE_månedlig.csv data/circklek_SE_månedlig.csv
          git diff --staged --quiet || git commit -m "chore: weekly SE price update $(date -u +%Y-%m-%d)"
          git push origin main
